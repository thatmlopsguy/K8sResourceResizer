apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustomize-hello-world-production
  namespace: argocd
spec:
  project: default
  destination:
    name: in-cluster
    namespace: hello-world-production
  source:
    path: tests/integration/kustomize/hello-world/overlay/production
    repoURL: 'https://github.com/thatmlopsguy/k8sresourceresizer'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
